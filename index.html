<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raccolta Dati Rappresentazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #c8522a;
    --accent-light: #e8937a;
    --muted: #8a7f72;
    --border: #d4c9b8;
    --white: #fdfaf5;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(200,82,42,0.18);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -40px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: rgba(200,82,42,0.10);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.01em;
    position: relative;
    z-index: 1;
  }
  header p {
    margin-top: 0.5rem;
    color: var(--accent-light);
    font-size: 0.95rem;
    font-weight: 300;
    position: relative;
    z-index: 1;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(26,26,46,0.07);
  }
  .toolbar-left {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.5rem 1.1rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #a8431e; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--ink); background: var(--paper); }
  .btn-success {
    background: #2a7a4b;
    color: white;
  }
  .btn-success:hover { background: #1f5e39; transform: translateY(-1px); }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* STATO VUOTO */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }
  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  /* CARD RAPPRESENTAZIONE */
  .card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 2.5rem;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }
  .card-title-input {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--border);
    color: var(--ink);
    width: 100%;
    padding: 0.2rem 0.4rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .card-title-input:focus { border-bottom-color: var(--accent); }
  .card-title-input::placeholder { color: var(--muted); font-style: italic; }

  .card-num {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    margin-right: 0.75rem;
    flex-shrink: 0;
  }

  .btn-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.2rem;
    padding: 0.2rem;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:hover { color: var(--accent); }

  /* IMMAGINE */
  .image-area {
    position: relative;
    background: #e8e2d9;
    min-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }
  .image-area img {
    width: 100%;
    max-height: 520px;
    object-fit: contain;
    display: block;
    transition: transform 0.3s ease;
  }
  .image-area:hover img { transform: scale(1.01); }
  .image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    color: var(--muted);
    padding: 3rem 2rem;
    text-align: center;
  }
  .image-placeholder .ph-icon { font-size: 2.5rem; opacity: 0.5; }
  .image-placeholder p { font-size: 0.85rem; }
  .image-placeholder strong { color: var(--accent); }
  input[type="file"] { display: none; }

  .img-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,26,46,0.0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    opacity: 0;
  }
  .image-area:hover .img-overlay { opacity: 1; background: rgba(26,26,46,0.22); }
  .img-overlay span {
    background: white;
    color: var(--ink);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
  }

  /* DOMANDE */
  .questions-area {
    padding: 1.25rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .question-block {
    background: var(--paper);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    border: 1px solid var(--border);
    position: relative;
  }

  .question-label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .q-type-badge {
    font-size: 0.68rem;
    background: var(--border);
    color: var(--muted);
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  .question-text-input {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--border);
    padding: 0.2rem 0.2rem 0.4rem;
    outline: none;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .question-text-input:focus { border-bottom-color: var(--accent); }
  .question-text-input::placeholder { color: var(--muted); }

  /* risposta aperta */
  .answer-textarea {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.55;
  }
  .answer-textarea:focus { border-color: var(--accent); }
  .answer-textarea::placeholder { color: #bbb; }

  /* scala */
  .rating-scale {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.25rem;
  }
  .rating-btn {
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rating-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rating-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.3rem;
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* aggiungi domanda */
  .add-question-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  /* FOOTER CARD */
  .card-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    background: var(--paper);
  }

  /* MODAL IMMAGINE GRANDE */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,20,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    object-fit: contain;
  }
  .lightbox-close {
    position: fixed;
    top: 1.2rem; right: 1.5rem;
    background: none;
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    z-index: 1001;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .lightbox-close:hover { opacity: 1; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.88rem;
    z-index: 9999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* COUNTER */
  .counter {
    font-size: 0.82rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .counter strong { color: var(--ink); }

  @media (max-width: 600px) {
    .toolbar { padding: 0.75rem 1rem; }
    main { padding: 1.25rem 0.75rem 3rem; }
    .questions-area { padding: 1rem; }
    .rating-btn { width: 36px; height: 36px; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Raccolta Dati — Rappresentazioni</h1>
  <p>Carica le immagini e configura le domande per ogni scheda</p>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn btn-primary" onclick="addCard()">＋ Aggiungi rappresentazione</button>
    <span class="counter" id="counter">Nessuna scheda</span>
  </div>
  <button class="btn btn-success" onclick="exportCSV()">⬇ Esporta CSV</button>
</div>

<main id="main">
  <div class="empty-state" id="emptyState">
    <div class="icon">🖼️</div>
    <h2>Nessuna rappresentazione ancora</h2>
    <p>Clicca su <strong>+ Aggiungi rappresentazione</strong> per iniziare.<br>Potrai caricare immagini grandi e aggiungere domande personalizzate.</p>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let cards = [];
let cardIdCounter = 0;

// ── AGGIUNGI CARD ──────────────────────────────────────────
function addCard() {
  const id = ++cardIdCounter;
  const card = {
    id,
    title: '',
    imageSrc: null,
    questions: []
  };
  cards.push(card);
  renderCard(card);
  updateCounter();
  document.getElementById('emptyState').style.display = 'none';
  // Scorri alla nuova card
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ── RIMUOVI CARD ───────────────────────────────────────────
function removeCard(id) {
  if (!confirm('Rimuovere questa scheda?')) return;
  cards = cards.filter(c => c.id !== id);
  const el = document.getElementById('card-' + id);
  if (el) el.remove();
  updateCounter();
  if (cards.length === 0) document.getElementById('emptyState').style.display = '';
}

// ── RENDER CARD ────────────────────────────────────────────
function renderCard(card) {
  const main = document.getElementById('main');
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-' + card.id;
  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">#${card.id}</span>
      <input class="card-title-input" type="text" placeholder="Titolo rappresentazione (es. Amleto, Atto I)"
        value="${card.title}"
        oninput="updateCardTitle(${card.id}, this.value)">
      <button class="btn-remove" onclick="removeCard(${card.id})" title="Rimuovi scheda">✕</button>
    </div>

    <div class="image-area" id="imgArea-${card.id}" onclick="triggerUpload(${card.id})">
      <div class="image-placeholder" id="imgPlaceholder-${card.id}">
        <div class="ph-icon">🖼️</div>
        <p>Clicca per caricare un'immagine<br><strong>Formati: JPG, PNG, WEBP, GIF</strong></p>
      </div>
      <img id="img-${card.id}" src="" alt="" style="display:none" onclick="openLightbox(event, ${card.id})">
      <div class="img-overlay"><span>🔍 Zoom / Cambia immagine</span></div>
      <input type="file" id="fileInput-${card.id}" accept="image/*" onchange="handleImage(${card.id}, event)">
    </div>

    <div class="questions-area" id="questions-${card.id}">
      <div class="add-question-row">
        <button class="btn btn-secondary" onclick="addQuestion(${card.id}, 'open')">＋ Risposta aperta</button>
        <button class="btn btn-secondary" onclick="addQuestion(${card.id}, 'rating')">＋ Scala di valutazione</button>
      </div>
    </div>

    <div class="card-footer">
      <span style="font-size:0.8rem;color:var(--muted);">Clicca sull'immagine per ingrandirla</span>
    </div>
  `;
  main.appendChild(div);
}

// ── TITOLO CARD ────────────────────────────────────────────
function updateCardTitle(id, value) {
  const card = cards.find(c => c.id === id);
  if (card) card.title = value;
}

// ── UPLOAD IMMAGINE ────────────────────────────────────────
function triggerUpload(id) {
  // Se c'è già un'immagine, solo zoom se click sull'img
  document.getElementById('fileInput-' + id).click();
}

function handleImage(id, event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const src = e.target.result;
    const card = cards.find(c => c.id === id);
    if (card) card.imageSrc = src;

    const img = document.getElementById('img-' + id);
    const ph = document.getElementById('imgPlaceholder-' + id);
    img.src = src;
    img.style.display = 'block';
    if (ph) ph.style.display = 'none';

    // rimuovi click da area (useremo overlay)
    const area = document.getElementById('imgArea-' + id);
    area.onclick = null;
    img.onclick = (ev) => { ev.stopPropagation(); openLightbox(ev, id); };
    area.onclick = () => document.getElementById('fileInput-' + id).click();
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ── LIGHTBOX ───────────────────────────────────────────────
function openLightbox(e, id) {
  e.stopPropagation();
  const card = cards.find(c => c.id === id);
  if (!card || !card.imageSrc) return;
  document.getElementById('lightboxImg').src = card.imageSrc;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── AGGIUNGI DOMANDA ───────────────────────────────────────
let qIdCounter = 0;
function addQuestion(cardId, type) {
  const card = cards.find(c => c.id === cardId);
  if (!card) return;
  const qId = ++qIdCounter;
  const q = { id: qId, type, text: '', answer: type === 'rating' ? null : '' };
  if (type === 'rating') {
    q.min = 1; q.max = 5;
    q.labelMin = 'Per niente'; q.labelMax = 'Moltissimo';
  }
  card.questions.push(q);

  const container = document.getElementById('questions-' + cardId);
  const addRow = container.querySelector('.add-question-row');

  const div = document.createElement('div');
  div.className = 'question-block';
  div.id = 'q-' + qId;

  if (type === 'open') {
    div.innerHTML = `
      <div class="question-label">
        Domanda <span class="q-type-badge">risposta aperta</span>
        <button class="btn-remove" onclick="removeQuestion(${cardId}, ${qId})">✕</button>
      </div>
      <input class="question-text-input" type="text" placeholder="Scrivi la domanda…"
        oninput="updateQ(${cardId},${qId},'text',this.value)">
      <textarea class="answer-textarea" placeholder="Spazio per la risposta…"
        oninput="updateQ(${cardId},${qId},'answer',this.value)"></textarea>
    `;
  } else {
    div.innerHTML = `
      <div class="question-label">
        Domanda <span class="q-type-badge">scala di valutazione</span>
        <button class="btn-remove" onclick="removeQuestion(${cardId}, ${qId})">✕</button>
      </div>
      <input class="question-text-input" type="text" placeholder="Scrivi la domanda…"
        oninput="updateQ(${cardId},${qId},'text',this.value)">
      <div class="rating-scale" id="scale-${qId}"></div>
      <div class="scale-labels">
        <span id="sl-min-${qId}">Per niente</span>
        <span id="sl-max-${qId}">Moltissimo</span>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:0.6rem;flex-wrap:wrap;align-items:center;">
        <label style="font-size:0.75rem;color:var(--muted);">Scala:</label>
        <input type="number" min="1" max="3" value="1" style="width:45px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.3rem;font-size:0.8rem;outline:none;" oninput="updateRatingRange(${cardId},${qId},this.value,null)">
        <span style="font-size:0.75rem;color:var(--muted);">a</span>
        <input type="number" min="2" max="10" value="5" style="width:45px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.3rem;font-size:0.8rem;outline:none;" oninput="updateRatingRange(${cardId},${qId},null,this.value)">
        <span style="font-size:0.75rem;color:var(--muted);margin-left:0.5rem;">Etichette:</span>
        <input type="text" placeholder="Min" value="Per niente" style="width:90px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.4rem;font-size:0.8rem;outline:none;" oninput="updateQ(${cardId},${qId},'labelMin',this.value);document.getElementById('sl-min-${qId}').textContent=this.value">
        <input type="text" placeholder="Max" value="Moltissimo" style="width:90px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.4rem;font-size:0.8rem;outline:none;" oninput="updateQ(${cardId},${qId},'labelMax',this.value);document.getElementById('sl-max-${qId}').textContent=this.value">
      </div>
    `;
    setTimeout(() => buildRatingScale(qId, 1, 5, cardId), 0);
  }

  container.insertBefore(div, addRow);
}

function buildRatingScale(qId, min, max, cardId) {
  const scaleEl = document.getElementById('scale-' + qId);
  if (!scaleEl) return;
  scaleEl.innerHTML = '';
  for (let i = min; i <= max; i++) {
    const btn = document.createElement('button');
    btn.className = 'rating-btn';
    btn.textContent = i;
    btn.type = 'button';
    btn.dataset.val = i;
    btn.onclick = () => selectRating(qId, i, min, max, cardId);
    scaleEl.appendChild(btn);
  }
}

function selectRating(qId, val, min, max, cardId) {
  // evidenzia
  for (let i = min; i <= max; i++) {
    const btn = document.querySelector(`#scale-${qId} [data-val="${i}"]`);
    if (btn) btn.classList.toggle('selected', i === val);
  }
  updateQ(cardId, qId, 'answer', val);
}

function updateRatingRange(cardId, qId, newMin, newMax) {
  const card = cards.find(c => c.id === cardId);
  const q = card?.questions.find(q => q.id === qId);
  if (!q) return;
  if (newMin !== null) q.min = parseInt(newMin) || 1;
  if (newMax !== null) q.max = parseInt(newMax) || 5;
  buildRatingScale(qId, q.min, q.max, cardId);
}

function updateQ(cardId, qId, field, value) {
  const card = cards.find(c => c.id === cardId);
  const q = card?.questions.find(q => q.id === qId);
  if (q) q[field] = value;
}

function removeQuestion(cardId, qId) {
  const card = cards.find(c => c.id === cardId);
  if (card) card.questions = card.questions.filter(q => q.id !== qId);
  const el = document.getElementById('q-' + qId);
  if (el) el.remove();
}

// ── COUNTER ────────────────────────────────────────────────
function updateCounter() {
  const el = document.getElementById('counter');
  const n = cards.length;
  el.innerHTML = n === 0 ? 'Nessuna scheda' : `<strong>${n}</strong> scheda${n !== 1 ? 'e' : ''}`;
}

// ── EXPORT CSV ─────────────────────────────────────────────
function exportCSV() {
  if (cards.length === 0) { showToast('⚠️ Nessuna scheda da esportare'); return; }

  // Raccogli tutte le domande uniche (per le intestazioni)
  const allQTexts = new Set();
  cards.forEach(c => c.questions.forEach(q => allQTexts.add(q.text || `Domanda (${q.type})`)));
  const qHeaders = Array.from(allQTexts);

  const rows = [];
  const header = ['ID', 'Titolo', ...qHeaders];
  rows.push(header.map(escapeCsv).join(','));

  cards.forEach(c => {
    const row = [c.id, c.title || '(senza titolo)'];
    qHeaders.forEach(qh => {
      const q = c.questions.find(q => (q.text || `Domanda (${q.type})`) === qh);
      row.push(q ? (q.answer ?? '') : '');
    });
    rows.push(row.map(escapeCsv).join(','));
  });

  const csv = '\uFEFF' + rows.join('\r\n'); // BOM per Excel
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'raccolta_dati_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV esportato con successo!');
}

function escapeCsv(val) {
  const s = String(val ?? '').replace(/"/g, '""');
  return `"${s}"`;
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
