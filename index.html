<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raccolta Dati — Rappresentazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #c8522a;
    --accent-light: #e8937a;
    --muted: #8a7f72;
    --border: #d4c9b8;
    --white: #fdfaf5;
    --green: #2a7a4b;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--ink); color: var(--white);
    padding: 2rem 2rem 1.5rem; text-align: center; position: relative; overflow: hidden;
  }
  header::before { content:''; position:absolute; top:-60px; left:-60px; width:220px; height:220px; border-radius:50%; background:rgba(200,82,42,0.18); }
  header::after  { content:''; position:absolute; bottom:-80px; right:-40px; width:260px; height:260px; border-radius:50%; background:rgba(200,82,42,0.10); }
  header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,5vw,2.2rem); position:relative; z-index:1; }
  header p  { margin-top:0.4rem; color:var(--accent-light); font-size:0.9rem; font-weight:300; position:relative; z-index:1; }

  /* TAB NAV */
  .tab-nav {
    background: var(--white); border-bottom: 2px solid var(--border);
    display: flex; justify-content: center; gap: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,26,46,0.07);
  }
  .tab-btn {
    font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500;
    padding: 1rem 2rem; border: none; background: transparent;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--ink); background: var(--paper); }

  /* PANNELLI */
  .panel { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .panel.active { display: block; }

  /* BTN */
  .btn {
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
    padding: 0.5rem 1.1rem; border-radius:6px; border:none; cursor:pointer;
    transition:all 0.18s; display:inline-flex; align-items:center; gap:0.4rem;
  }
  .btn-primary   { background:var(--accent); color:white; }
  .btn-primary:hover { background:#a8431e; transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--ink); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--ink); background:var(--paper); }
  .btn-success   { background:var(--green); color:white; }
  .btn-success:hover { background:#1f5e39; transform:translateY(-1px); }
  .btn-danger    { background:#c0392b; color:white; }
  .btn-danger:hover { background:#962d22; }
  .btn:disabled  { opacity:0.5; cursor:not-allowed; transform:none !important; }

  /* TOOLBAR */
  .toolbar {
    display:flex; flex-wrap:wrap; gap:0.75rem;
    align-items:center; justify-content:space-between;
    margin-bottom:1.75rem;
  }

  /* CARD */
  .card {
    background:var(--white); border-radius:14px; box-shadow:var(--shadow);
    margin-bottom:2.5rem; overflow:hidden; border:1px solid var(--border);
    animation:fadeUp 0.35s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 1.25rem 0.75rem; border-bottom:1px solid var(--border);
    background:var(--paper); gap:0.75rem;
  }
  .card-num  { font-size:0.75rem; font-weight:500; color:var(--muted); flex-shrink:0; }
  .card-title-input {
    font-family:'Playfair Display',serif; font-size:1.05rem; font-style:italic;
    background:transparent; border:none; border-bottom:1.5px dashed var(--border);
    color:var(--ink); flex:1; padding:0.2rem 0.4rem; outline:none; transition:border-color 0.2s;
  }
  .card-title-input:focus { border-bottom-color:var(--accent); }
  .card-title-input::placeholder { color:var(--muted); }
  .btn-remove { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.2rem; padding:0.2rem; border-radius:4px; transition:color 0.15s; flex-shrink:0; }
  .btn-remove:hover { color:var(--accent); }

  /* IMMAGINE ADMIN */
  .image-area {
    position:relative; background:#e8e2d9; min-height:200px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; overflow:hidden;
  }
  .image-area img { width:100%; max-height:480px; object-fit:contain; display:block; }
  .image-placeholder { display:flex; flex-direction:column; align-items:center; gap:0.6rem; color:var(--muted); padding:3rem 2rem; text-align:center; }
  .image-placeholder .ph-icon { font-size:2.5rem; opacity:0.5; }
  .image-placeholder p { font-size:0.85rem; }
  .image-placeholder strong { color:var(--accent); }
  input[type="file"] { display:none; }
  .img-overlay { position:absolute; inset:0; background:rgba(26,26,46,0); display:flex; align-items:center; justify-content:center; transition:background 0.2s; opacity:0; }
  .image-area:hover .img-overlay { opacity:1; background:rgba(26,26,46,0.22); }
  .img-overlay span { background:white; color:var(--ink); font-size:0.8rem; font-weight:500; padding:0.4rem 0.9rem; border-radius:20px; }
  .upload-progress { position:absolute; bottom:0; left:0; right:0; height:4px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform 0.3s; }

  /* DOMANDE ADMIN */
  .questions-area { padding:1.25rem 1.5rem 1.5rem; display:flex; flex-direction:column; gap:1rem; }
  .question-block { background:var(--paper); border-radius:10px; padding:1rem 1.1rem; border:1px solid var(--border); }
  .question-label { font-size:0.78rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; display:flex; align-items:center; justify-content:space-between; }
  .q-type-badge { font-size:0.68rem; background:var(--border); color:var(--muted); padding:0.15rem 0.5rem; border-radius:20px; text-transform:none; letter-spacing:0; font-weight:400; }
  .question-text-input {
    width:100%; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500;
    color:var(--ink); background:transparent; border:none; border-bottom:1.5px dashed var(--border);
    padding:0.2rem 0.2rem 0.4rem; outline:none; margin-bottom:0.5rem; transition:border-color 0.2s;
  }
  .question-text-input:focus { border-bottom-color:var(--accent); }
  .question-text-input::placeholder { color:var(--muted); }
  .add-question-row { display:flex; gap:0.5rem; flex-wrap:wrap; }
  .card-footer { padding:0.75rem 1.5rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:0.5rem; background:var(--paper); }

  /* STATO VUOTO */
  .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
  .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; opacity:0.5; }
  .empty-state h2 { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--ink); margin-bottom:0.5rem; }
  .empty-state p { font-size:0.9rem; line-height:1.6; }

  /* FORM PUBBLICO */
  .form-intro { text-align:center; padding:2rem 1rem 1.5rem; }
  .form-intro h2 { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:0.5rem; }
  .form-intro p { color:var(--muted); font-size:0.9rem; }

  .form-card {
    background:var(--white); border-radius:14px; box-shadow:var(--shadow);
    margin-bottom:2.5rem; overflow:hidden; border:1px solid var(--border);
  }
  .form-card-title {
    font-family:'Playfair Display',serif; font-size:1.15rem; font-style:italic;
    padding:1rem 1.5rem; border-bottom:1px solid var(--border); background:var(--paper);
  }
  .form-image-wrap { background:#e8e2d9; }
  .form-image-wrap img { width:100%; max-height:500px; object-fit:contain; display:block; cursor:zoom-in; }
  .form-questions { padding:1.5rem; display:flex; flex-direction:column; gap:1.25rem; }

  .form-question { display:flex; flex-direction:column; gap:0.6rem; }
  .form-question label { font-size:0.95rem; font-weight:500; color:var(--ink); }
  .answer-textarea {
    width:100%; min-height:80px; resize:vertical;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--ink);
    background:var(--white); border:1.5px solid var(--border); border-radius:7px;
    padding:0.65rem 0.85rem; outline:none; transition:border-color 0.2s; line-height:1.55;
  }
  .answer-textarea:focus { border-color:var(--accent); }
  .answer-textarea::placeholder { color:#bbb; }
  .rating-scale { display:flex; gap:0.5rem; flex-wrap:wrap; }
  .rating-btn {
    width:42px; height:42px; border-radius:8px; border:2px solid var(--border);
    background:var(--white); font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500;
    color:var(--ink); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center;
  }
  .rating-btn:hover { border-color:var(--accent); color:var(--accent); }
  .rating-btn.selected { background:var(--accent); border-color:var(--accent); color:white; }
  .scale-labels { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--muted); margin-top:0.25rem; }

  .submit-area { padding:1.5rem; border-top:1px solid var(--border); text-align:center; background:var(--paper); }
  .btn-submit { font-size:1rem; padding:0.85rem 3rem; border-radius:8px; }

  /* RISPOSTE */
  .risposte-table { width:100%; border-collapse:collapse; font-size:0.85rem; background:var(--white); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); }
  .risposte-table th { background:var(--ink); color:white; padding:0.75rem 1rem; text-align:left; font-weight:500; font-size:0.8rem; }
  .risposte-table td { padding:0.65rem 1rem; border-bottom:1px solid var(--border); vertical-align:top; }
  .risposte-table tr:last-child td { border-bottom:none; }
  .risposte-table tr:hover td { background:var(--paper); }

  /* LIGHTBOX */
  .lightbox { display:none; position:fixed; inset:0; background:rgba(10,10,20,0.92); z-index:1000; align-items:center; justify-content:center; padding:1.5rem; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:100%; max-height:90vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.5); object-fit:contain; }
  .lightbox-close { position:fixed; top:1.2rem; right:1.5rem; background:none; border:none; color:white; font-size:2rem; cursor:pointer; z-index:1001; opacity:0.8; transition:opacity 0.15s; }
  .lightbox-close:hover { opacity:1; }

  /* TOAST */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:white; padding:0.75rem 1.5rem; border-radius:8px; font-size:0.88rem; z-index:9999; transition:transform 0.3s ease; pointer-events:none; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--green); }
  .toast.error   { background:#c0392b; }

  /* LOADER */
  .loader { text-align:center; padding:3rem; color:var(--muted); font-size:0.9rem; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* BADGE */
  .badge { display:inline-block; font-size:0.72rem; padding:0.2rem 0.6rem; border-radius:20px; font-weight:500; }
  .badge-open  { background:#e8f4ee; color:var(--green); }
  .badge-scale { background:#fef0eb; color:var(--accent); }

  @media(max-width:600px) {
    .tab-btn { padding:0.85rem 1rem; font-size:0.82rem; }
    .panel { padding:1.25rem 0.75rem 3rem; }
    .questions-area { padding:1rem; }
    .rating-btn { width:36px; height:36px; }
  }
</style>
</head>
<body>

<header>
  <h1>Raccolta Dati — Rappresentazioni</h1>
  <p id="headerSub">Caricamento…</p>
</header>

<nav class="tab-nav" id="tabNav" style="display:none">
  <button class="tab-btn active" onclick="switchTab('admin')">⚙️ Gestione</button>
  <button class="tab-btn" onclick="switchTab('form')">📋 Form intervistati</button>
  <button class="tab-btn" onclick="switchTab('risposte')">📊 Risposte</button>
</nav>

<!-- PANNELLO ADMIN -->
<div class="panel active" id="panel-admin">
  <div class="loader"><div class="spinner"></div>Connessione a Supabase…</div>
</div>

<!-- PANNELLO FORM -->
<div class="panel" id="panel-form">
  <div class="loader"><div class="spinner"></div>Caricamento form…</div>
</div>

<!-- PANNELLO RISPOSTE -->
<div class="panel" id="panel-risposte">
  <div class="loader"><div class="spinner"></div>Caricamento risposte…</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG SUPABASE ──────────────────────────────────────
const SUPABASE_URL = 'https://nfnxrpjidlpghnsnfbez.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbnhycGppZGxwZ2huc25mYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1NDQsImV4cCI6MjA4OTg0MjU0NH0.SPJRD0MuJKcjPgOxfW2_h4l3IhJ_-geEXLx3phTgrcc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATO LOCALE ─────────────────────────────────────────
let adminCards   = []; // { id, titolo, immagine_url, domande:[] }
let formAnswers  = {}; // { domanda_id: valore }
let currentTab   = 'admin';

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    await loadAdmin();
    document.getElementById('tabNav').style.display = 'flex';
    document.getElementById('headerSub').textContent = 'Pannello di gestione';
  } catch(e) {
    document.getElementById('panel-admin').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Errore di connessione</h2><p>${e.message}</p></div>`;
  }
});

// ── TABS ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['admin','form','risposte'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  const subs = { admin:'Pannello di gestione', form:'Form per gli intervistati', risposte:'Raccolta risposte' };
  document.getElementById('headerSub').textContent = subs[tab];

  if (tab === 'form')     loadForm();
  if (tab === 'risposte') loadRisposte();
}

// ════════════════════════════════════════════════════════
// PANNELLO ADMIN
// ════════════════════════════════════════════════════════
async function loadAdmin() {
  const panel = document.getElementById('panel-admin');

  const { data: rapp, error } = await sb
    .from('rappresentazioni')
    .select('*, domande(*)')
    .order('ordine');
  if (error) throw error;

  adminCards = (rapp || []).map(r => ({
    ...r,
    domande: (r.domande || []).sort((a,b) => a.ordine - b.ordine)
  }));

  renderAdmin();
}

function renderAdmin() {
  const panel = document.getElementById('panel-admin');
  panel.innerHTML = `
    <div class="toolbar">
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-primary" onclick="addAdminCard()">＋ Aggiungi rappresentazione</button>
        <span style="font-size:0.82rem;color:var(--muted);">
          <strong style="color:var(--ink)">${adminCards.length}</strong> scheda${adminCards.length!==1?'e':''}
        </span>
      </div>
    </div>
    <div id="adminCardsList"></div>
  `;

  if (adminCards.length === 0) {
    document.getElementById('adminCardsList').innerHTML = `
      <div class="empty-state">
        <div class="icon">🖼️</div>
        <h2>Nessuna rappresentazione ancora</h2>
        <p>Clicca su <strong>+ Aggiungi rappresentazione</strong> per iniziare.</p>
      </div>`;
  } else {
    adminCards.forEach(renderAdminCard);
  }
}

function renderAdminCard(card) {
  const list = document.getElementById('adminCardsList');
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'acard-' + card.id;

  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">#${adminCards.indexOf(card)+1}</span>
      <input class="card-title-input" type="text" placeholder="Titolo rappresentazione…"
        value="${esc(card.titolo)}"
        onchange="saveCardTitle('${card.id}', this.value)">
      <button class="btn-remove" onclick="deleteCard('${card.id}')">✕</button>
    </div>

    <div class="image-area" id="imgArea-${card.id}" onclick="document.getElementById('fi-${card.id}').click()">
      ${card.immagine_url
        ? `<img src="${card.immagine_url}" alt="" onclick="openLightbox(event,'${card.immagine_url}')">`
        : `<div class="image-placeholder"><div class="ph-icon">🖼️</div><p>Clicca per caricare un'immagine<br><strong>JPG, PNG, WEBP</strong></p></div>`
      }
      <div class="img-overlay"><span>${card.immagine_url ? '🔍 Zoom / Cambia' : '⬆ Carica immagine'}</span></div>
      <div class="upload-progress" id="prog-${card.id}"></div>
      <input type="file" id="fi-${card.id}" accept="image/*" onchange="uploadImage('${card.id}', event)">
    </div>

    <div class="questions-area" id="aq-${card.id}">
      ${card.domande.map(q => renderAdminQuestionHTML(card.id, q)).join('')}
      <div class="add-question-row">
        <button class="btn btn-secondary" onclick="addQuestion('${card.id}','aperta')">＋ Risposta aperta</button>
        <button class="btn btn-secondary" onclick="addQuestion('${card.id}','scala')">＋ Scala di valutazione</button>
      </div>
    </div>
  `;
  list.appendChild(div);
}

function renderAdminQuestionHTML(cardId, q) {
  if (q.tipo === 'aperta') {
    return `
      <div class="question-block" id="qblock-${q.id}">
        <div class="question-label">
          Domanda <span class="q-type-badge">risposta aperta</span>
          <button class="btn-remove" onclick="deleteQuestion('${q.id}','${cardId}')">✕</button>
        </div>
        <input class="question-text-input" type="text" placeholder="Scrivi la domanda…"
          value="${esc(q.testo)}" onchange="saveQuestion('${q.id}',{testo:this.value})">
        <div style="font-size:0.78rem;color:var(--muted);margin-top:0.25rem;">
          Gli intervistati vedranno un campo testo libero
        </div>
      </div>`;
  } else {
    return `
      <div class="question-block" id="qblock-${q.id}">
        <div class="question-label">
          Domanda <span class="q-type-badge">scala di valutazione</span>
          <button class="btn-remove" onclick="deleteQuestion('${q.id}','${cardId}')">✕</button>
        </div>
        <input class="question-text-input" type="text" placeholder="Scrivi la domanda…"
          value="${esc(q.testo)}" onchange="saveQuestion('${q.id}',{testo:this.value})">
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin-top:0.4rem;">
          <label style="font-size:0.75rem;color:var(--muted);">da</label>
          <input type="number" min="1" max="3" value="${q.scala_min}" style="width:48px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.3rem;font-size:0.82rem;outline:none;" onchange="saveQuestion('${q.id}',{scala_min:+this.value})">
          <label style="font-size:0.75rem;color:var(--muted);">a</label>
          <input type="number" min="2" max="10" value="${q.scala_max}" style="width:48px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.3rem;font-size:0.82rem;outline:none;" onchange="saveQuestion('${q.id}',{scala_max:+this.value})">
          <input type="text" placeholder="Etichetta min" value="${esc(q.label_min)}" style="width:110px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.4rem;font-size:0.82rem;outline:none;" onchange="saveQuestion('${q.id}',{label_min:this.value})">
          <input type="text" placeholder="Etichetta max" value="${esc(q.label_max)}" style="width:110px;border:1.5px solid var(--border);border-radius:5px;padding:0.2rem 0.4rem;font-size:0.82rem;outline:none;" onchange="saveQuestion('${q.id}',{label_max:this.value})">
        </div>
      </div>`;
  }
}

// CRUD Admin
async function addAdminCard() {
  const { data, error } = await sb.from('rappresentazioni').insert({ titolo: '', ordine: adminCards.length }).select('*, domande(*)').single();
  if (error) { showToast('Errore: ' + error.message, 'error'); return; }
  data.domande = [];
  adminCards.push(data);
  if (adminCards.length === 1) renderAdmin();
  else renderAdminCard(data);
  updateAdminCounter();
}

function updateAdminCounter() {
  const el = document.querySelector('#panel-admin .toolbar span');
  if (el) el.innerHTML = `<strong style="color:var(--ink)">${adminCards.length}</strong> scheda${adminCards.length!==1?'e':''}`;
}

async function saveCardTitle(id, titolo) {
  const c = adminCards.find(c=>c.id===id);
  if (c) c.titolo = titolo;
  await sb.from('rappresentazioni').update({ titolo }).eq('id', id);
}

async function deleteCard(id) {
  if (!confirm('Eliminare questa scheda e tutte le sue domande?')) return;
  await sb.from('rappresentazioni').delete().eq('id', id);
  adminCards = adminCards.filter(c=>c.id!==id);
  const el = document.getElementById('acard-' + id);
  if (el) el.remove();
  updateAdminCounter();
  if (adminCards.length === 0) {
    document.getElementById('adminCardsList').innerHTML = `
      <div class="empty-state"><div class="icon">🖼️</div><h2>Nessuna rappresentazione ancora</h2><p>Clicca su <strong>+ Aggiungi rappresentazione</strong> per iniziare.</p></div>`;
  }
  showToast('Scheda eliminata', 'success');
}

async function addQuestion(cardId, tipo) {
  const card = adminCards.find(c=>c.id===cardId);
  const ordine = card ? card.domande.length : 0;
  const { data, error } = await sb.from('domande').insert({
    rappresentazione_id: cardId, testo: '', tipo, ordine
  }).select().single();
  if (error) { showToast('Errore: ' + error.message, 'error'); return; }
  if (card) card.domande.push(data);
  const container = document.getElementById('aq-' + cardId);
  const addRow = container.querySelector('.add-question-row');
  const tmp = document.createElement('div');
  tmp.innerHTML = renderAdminQuestionHTML(cardId, data);
  container.insertBefore(tmp.firstElementChild, addRow);
}

async function saveQuestion(id, fields) {
  await sb.from('domande').update(fields).eq('id', id);
}

async function deleteQuestion(id, cardId) {
  await sb.from('domande').delete().eq('id', id);
  const el = document.getElementById('qblock-' + id);
  if (el) el.remove();
  const card = adminCards.find(c=>c.id===cardId);
  if (card) card.domande = card.domande.filter(q=>q.id!==id);
}

async function uploadImage(cardId, event) {
  const file = event.target.files[0];
  if (!file) return;
  const prog = document.getElementById('prog-' + cardId);
  prog.style.transform = 'scaleX(0.3)';

  const ext = file.name.split('.').pop();
  const path = `${cardId}_${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('immagini').upload(path, file, { upsert: true });
  if (upErr) { showToast('Errore upload: ' + upErr.message, 'error'); prog.style.transform='scaleX(0)'; return; }

  prog.style.transform = 'scaleX(0.7)';
  const { data: urlData } = sb.storage.from('immagini').getPublicUrl(path);
  const url = urlData.publicUrl;

  await sb.from('rappresentazioni').update({ immagine_url: url }).eq('id', cardId);
  const card = adminCards.find(c=>c.id===cardId);
  if (card) card.immagine_url = url;

  prog.style.transform = 'scaleX(1)';
  setTimeout(() => { prog.style.transform = 'scaleX(0)'; }, 600);

  // Aggiorna UI
  const area = document.getElementById('imgArea-' + cardId);
  let img = area.querySelector('img');
  const ph = area.querySelector('.image-placeholder');
  if (ph) ph.remove();
  if (!img) {
    img = document.createElement('img');
    img.onclick = (e) => openLightbox(e, url);
    area.insertBefore(img, area.querySelector('.img-overlay'));
  }
  img.src = url;
  area.querySelector('.img-overlay span').textContent = '🔍 Zoom / Cambia';
  showToast('✅ Immagine caricata!', 'success');
  event.target.value = '';
}

// ════════════════════════════════════════════════════════
// PANNELLO FORM (pubblico)
// ════════════════════════════════════════════════════════
async function loadForm() {
  const panel = document.getElementById('panel-form');
  panel.innerHTML = `<div class="loader"><div class="spinner"></div>Caricamento…</div>`;
  formAnswers = {};

  const { data: rapp, error } = await sb
    .from('rappresentazioni')
    .select('*, domande(*)')
    .order('ordine');
  if (error) { panel.innerHTML = `<p style="color:red;padding:2rem">${error.message}</p>`; return; }

  const cards = (rapp || []).filter(r => r.immagine_url || (r.domande && r.domande.length > 0));
  if (cards.length === 0) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">📋</div><h2>Nessun contenuto ancora</h2><p>Il gestore deve prima aggiungere le rappresentazioni dal pannello Gestione.</p></div>`;
    return;
  }

  let html = `<div class="form-intro"><h2>Compila il questionario</h2><p>Visualizza ogni rappresentazione e rispondi alle domande.</p></div>`;
  cards.forEach(card => {
    const domande = (card.domande || []).sort((a,b)=>a.ordine-b.ordine);
    html += `<div class="form-card">
      <div class="form-card-title">${esc(card.titolo) || '<em>Rappresentazione</em>'}</div>
      ${card.immagine_url ? `<div class="form-image-wrap"><img src="${card.immagine_url}" alt="" onclick="openLightbox(event,'${card.immagine_url}')"></div>` : ''}
      <div class="form-questions">
        ${domande.map(q => renderFormQuestion(q)).join('')}
        ${domande.length === 0 ? '<p style="color:var(--muted);font-size:0.85rem;font-style:italic;">Nessuna domanda per questa scheda.</p>' : ''}
      </div>
    </div>`;
  });

  html += `<div class="submit-area">
    <button class="btn btn-success btn-submit" onclick="submitForm()">✓ Invia risposte</button>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:0.75rem;">Le tue risposte verranno salvate in modo anonimo</p>
  </div>`;

  panel.innerHTML = html;
}

function renderFormQuestion(q) {
  if (q.tipo === 'aperta') {
    return `<div class="form-question">
      <label>${esc(q.testo) || 'Domanda'}</label>
      <textarea class="answer-textarea" placeholder="Scrivi la tua risposta…"
        oninput="formAnswers['${q.id}']=this.value"></textarea>
    </div>`;
  } else {
    const btns = [];
    for (let i = q.scala_min; i <= q.scala_max; i++) {
      btns.push(`<button type="button" class="rating-btn" data-qid="${q.id}" data-val="${i}"
        onclick="selectFormRating('${q.id}',${i},${q.scala_min},${q.scala_max})">${i}</button>`);
    }
    return `<div class="form-question">
      <label>${esc(q.testo) || 'Domanda'}</label>
      <div class="rating-scale">${btns.join('')}</div>
      <div class="scale-labels"><span>${esc(q.label_min)}</span><span>${esc(q.label_max)}</span></div>
    </div>`;
  }
}

function selectFormRating(qId, val, min, max) {
  formAnswers[qId] = val;
  for (let i = min; i <= max; i++) {
    document.querySelectorAll(`[data-qid="${qId}"][data-val="${i}"]`)
      .forEach(b => b.classList.toggle('selected', i === val));
  }
}

async function submitForm() {
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true;
  btn.textContent = 'Invio in corso…';

  const inserts = Object.entries(formAnswers).map(([domanda_id, risposta]) => ({
    domanda_id,
    risposta: String(risposta),
    rappresentazione_id: null // opzionale, potremmo aggiungerlo
  }));

  // Aggiungi rappresentazione_id leggendola dalle domande
  const { data: domande } = await sb.from('domande').select('id, rappresentazione_id');
  inserts.forEach(r => {
    const d = (domande||[]).find(d=>d.id===r.domanda_id);
    if (d) r.rappresentazione_id = d.rappresentazione_id;
  });

  if (inserts.length === 0) {
    showToast('⚠️ Nessuna risposta da inviare', 'error');
    btn.disabled = false; btn.textContent = '✓ Invia risposte';
    return;
  }

  const { error } = await sb.from('risposte').insert(inserts);
  if (error) {
    showToast('Errore: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = '✓ Invia risposte';
    return;
  }

  document.getElementById('panel-form').innerHTML = `
    <div class="empty-state" style="padding:6rem 2rem">
      <div class="icon">🎉</div>
      <h2>Grazie per le tue risposte!</h2>
      <p>Le tue risposte sono state registrate con successo.</p>
    </div>`;
  showToast('✅ Risposte inviate!', 'success');
}

// ════════════════════════════════════════════════════════
// PANNELLO RISPOSTE
// ════════════════════════════════════════════════════════
async function loadRisposte() {
  const panel = document.getElementById('panel-risposte');
  panel.innerHTML = `<div class="loader"><div class="spinner"></div>Caricamento risposte…</div>`;

  const { data: risposte, error } = await sb
    .from('risposte')
    .select('*, domande(testo, tipo, rappresentazione_id, rappresentazioni(titolo))')
    .order('created_at', { ascending: false });

  if (error) { panel.innerHTML = `<p style="color:red;padding:2rem">${error.message}</p>`; return; }
  if (!risposte || risposte.length === 0) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">📊</div><h2>Nessuna risposta ancora</h2><p>Le risposte degli intervistati appariranno qui.</p></div>`;
    return;
  }

  panel.innerHTML = `
    <div class="toolbar">
      <span style="font-size:0.85rem;color:var(--muted);"><strong style="color:var(--ink)">${risposte.length}</strong> risposta${risposte.length!==1?'e':''}</span>
      <button class="btn btn-success" onclick="exportCSV()">⬇ Esporta CSV</button>
    </div>
    <div style="overflow-x:auto">
      <table class="risposte-table">
        <thead>
          <tr>
            <th>Rappresentazione</th>
            <th>Domanda</th>
            <th>Tipo</th>
            <th>Risposta</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody>
          ${risposte.map(r => `
            <tr>
              <td>${esc(r.domande?.rappresentazioni?.titolo || '—')}</td>
              <td>${esc(r.domande?.testo || '—')}</td>
              <td><span class="badge badge-${r.domande?.tipo==='aperta'?'open':'scale'}">${r.domande?.tipo||'—'}</span></td>
              <td>${esc(r.risposta || '—')}</td>
              <td style="color:var(--muted);font-size:0.8rem;white-space:nowrap">${new Date(r.created_at).toLocaleString('it-IT')}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  // salva per export
  panel._data = risposte;
}

function exportCSV() {
  const panel = document.getElementById('panel-risposte');
  const risposte = panel._data;
  if (!risposte) return;

  const rows = [['Rappresentazione','Domanda','Tipo','Risposta','Data'].map(escapeCsv).join(',')];
  risposte.forEach(r => {
    rows.push([
      r.domande?.rappresentazioni?.titolo || '',
      r.domande?.testo || '',
      r.domande?.tipo || '',
      r.risposta || '',
      new Date(r.created_at).toLocaleString('it-IT')
    ].map(escapeCsv).join(','));
  });

  const csv = '\uFEFF' + rows.join('\r\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'risposte_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('✅ CSV esportato!', 'success');
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeCsv(v) { return `"${String(v??'').replace(/"/g,'""')}"`; }

function openLightbox(e, src) {
  if (e) e.stopPropagation();
  document.getElementById('lightboxImg').src = typeof src === 'string' ? src : src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
