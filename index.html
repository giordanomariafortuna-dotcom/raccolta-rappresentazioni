<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raccolta Dati — Rappresentazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c8522a;
    --accent-light: #e8937a; --muted: #8a7f72; --border: #d4c9b8;
    --white: #fdfaf5; --green: #2a7a4b;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--ink); color: var(--white);
    padding: 2rem 2rem 1.5rem; text-align: center; position: relative; overflow: hidden;
  }
  header::before { content:''; position:absolute; top:-60px; left:-60px; width:220px; height:220px; border-radius:50%; background:rgba(200,82,42,0.18); }
  header::after  { content:''; position:absolute; bottom:-80px; right:-40px; width:260px; height:260px; border-radius:50%; background:rgba(200,82,42,0.10); }
  header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,5vw,2.2rem); position:relative; z-index:1; }
  header p  { margin-top:0.4rem; color:var(--accent-light); font-size:0.9rem; font-weight:300; position:relative; z-index:1; }

  .tab-nav {
    background: var(--white); border-bottom: 2px solid var(--border);
    display: flex; justify-content: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,26,46,0.07);
  }
  .tab-btn {
    font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500;
    padding: 1rem 2rem; border: none; background: transparent;
    color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--ink); background: var(--paper); }

  .panel { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .panel.active { display: block; }

  .btn {
    font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
    padding: 0.5rem 1.1rem; border-radius:6px; border:none; cursor:pointer;
    transition:all 0.18s; display:inline-flex; align-items:center; gap:0.4rem;
  }
  .btn-primary  { background:var(--accent); color:white; }
  .btn-primary:hover { background:#a8431e; transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--ink); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--ink); background:var(--paper); }
  .btn-success  { background:var(--green); color:white; }
  .btn-success:hover { background:#1f5e39; transform:translateY(-1px); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

  .toolbar { display:flex; flex-wrap:wrap; gap:0.75rem; align-items:center; justify-content:space-between; margin-bottom:1.75rem; }

  .card { background:var(--white); border-radius:14px; box-shadow:var(--shadow); margin-bottom:2.5rem; overflow:hidden; border:1px solid var(--border); animation:fadeUp 0.35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-header { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.25rem 0.75rem; border-bottom:1px solid var(--border); background:var(--paper); }
  .card-num { font-size:0.75rem; font-weight:500; color:var(--muted); flex-shrink:0; }
  .card-title-input {
    font-family:'Playfair Display',serif; font-size:1.05rem; font-style:italic;
    background:transparent; border:none; border-bottom:1.5px dashed var(--border);
    color:var(--ink); flex:1; padding:0.2rem 0.4rem; outline:none; transition:border-color 0.2s;
  }
  .card-title-input:focus { border-bottom-color:var(--accent); }
  .card-title-input::placeholder { color:var(--muted); }
  .btn-remove { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.2rem; padding:0.2rem; border-radius:4px; transition:color 0.15s; flex-shrink:0; }
  .btn-remove:hover { color:var(--accent); }

  .image-area { position:relative; background:#e8e2d9; min-height:200px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; }
  .image-area img { width:100%; max-height:480px; object-fit:contain; display:block; }
  .image-placeholder { display:flex; flex-direction:column; align-items:center; gap:0.6rem; color:var(--muted); padding:3rem 2rem; text-align:center; pointer-events:none; }
  .image-placeholder .ph-icon { font-size:2.5rem; opacity:0.5; }
  .image-placeholder p { font-size:0.85rem; }
  .image-placeholder strong { color:var(--accent); }
  input[type="file"] { display:none; }
  .img-overlay { position:absolute; inset:0; background:rgba(26,26,46,0); display:flex; align-items:center; justify-content:center; transition:background 0.2s; opacity:0; pointer-events:none; }
  .image-area:hover .img-overlay { opacity:1; background:rgba(26,26,46,0.22); }
  .img-overlay span { background:white; color:var(--ink); font-size:0.8rem; font-weight:500; padding:0.4rem 0.9rem; border-radius:20px; }
  .upload-progress { position:absolute; bottom:0; left:0; right:0; height:4px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform 0.3s; }

  .questions-area { padding:1.25rem 1.5rem 1.5rem; display:flex; flex-direction:column; gap:1rem; }
  .question-block { background:var(--paper); border-radius:10px; padding:1rem 1.1rem; border:1px solid var(--border); }
  .question-label { font-size:0.78rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; display:flex; align-items:center; justify-content:space-between; }
  .q-type-badge { font-size:0.68rem; background:var(--border); color:var(--muted); padding:0.15rem 0.5rem; border-radius:20px; text-transform:none; letter-spacing:0; font-weight:400; }
  .question-text-input {
    width:100%; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500;
    color:var(--ink); background:transparent; border:none; border-bottom:1.5px dashed var(--border);
    padding:0.2rem 0.2rem 0.4rem; outline:none; margin-bottom:0.5rem; transition:border-color 0.2s;
  }
  .question-text-input:focus { border-bottom-color:var(--accent); }
  .question-text-input::placeholder { color:var(--muted); }
  .add-question-row { display:flex; gap:0.5rem; flex-wrap:wrap; }

  .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
  .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; opacity:0.5; }
  .empty-state h2 { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--ink); margin-bottom:0.5rem; }
  .empty-state p { font-size:0.9rem; line-height:1.6; }

  .form-card { background:var(--white); border-radius:14px; box-shadow:var(--shadow); margin-bottom:2.5rem; overflow:hidden; border:1px solid var(--border); }
  .form-card-title { font-family:'Playfair Display',serif; font-size:1.15rem; font-style:italic; padding:1rem 1.5rem; border-bottom:1px solid var(--border); background:var(--paper); }
  .form-image-wrap { background:#e8e2d9; }
  .form-image-wrap img { width:100%; max-height:500px; object-fit:contain; display:block; cursor:zoom-in; }
  .form-questions { padding:1.5rem; display:flex; flex-direction:column; gap:1.25rem; }
  .form-question { display:flex; flex-direction:column; gap:0.6rem; }
  .form-question label { font-size:0.95rem; font-weight:500; color:var(--ink); }
  .answer-textarea {
    width:100%; min-height:80px; resize:vertical;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--ink);
    background:var(--white); border:1.5px solid var(--border); border-radius:7px;
    padding:0.65rem 0.85rem; outline:none; transition:border-color 0.2s; line-height:1.55;
  }
  .answer-textarea:focus { border-color:var(--accent); }
  .answer-textarea::placeholder { color:#bbb; }
  .rating-scale { display:flex; gap:0.5rem; flex-wrap:wrap; }
  .rating-btn {
    width:42px; height:42px; border-radius:8px; border:2px solid var(--border);
    background:var(--white); font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500;
    color:var(--ink); cursor:pointer; transition:all 0.15s;
  }
  .rating-btn:hover { border-color:var(--accent); color:var(--accent); }
  .rating-btn.selected { background:var(--accent); border-color:var(--accent); color:white; }
  .scale-labels { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--muted); margin-top:0.25rem; }
  .submit-area { padding:1.5rem; border-top:1px solid var(--border); text-align:center; background:var(--paper); }
  .btn-submit { font-size:1rem; padding:0.85rem 3rem; border-radius:8px; }

  .risposte-table { width:100%; border-collapse:collapse; font-size:0.85rem; background:var(--white); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); }
  .risposte-table th { background:var(--ink); color:white; padding:0.75rem 1rem; text-align:left; font-weight:500; font-size:0.8rem; }
  .risposte-table td { padding:0.65rem 1rem; border-bottom:1px solid var(--border); vertical-align:top; }
  .risposte-table tr:last-child td { border-bottom:none; }
  .risposte-table tr:hover td { background:var(--paper); }

  .pin-overlay { display:none; position:fixed; inset:0; background:rgba(10,10,20,0.7); z-index:2000; align-items:center; justify-content:center; }
  .pin-overlay.open { display:flex; }
  .pin-box { background:var(--white); border-radius:16px; padding:2.5rem 2rem; max-width:320px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .pin-box h2 { font-family:'Playfair Display',serif; font-size:1.3rem; margin:0.75rem 0 0.4rem; }
  .pin-box p  { font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem; }
  #pinInput {
    width:100%; text-align:center; font-size:1.8rem; letter-spacing:0.5rem;
    padding:0.6rem; border:2px solid var(--border); border-radius:8px;
    outline:none; font-family:'DM Sans',sans-serif; background:var(--paper); transition:border-color 0.2s;
  }
  #pinInput:focus { border-color:var(--accent); }
  #pinInput.shake { animation:shake 0.3s; border-color:#c0392b; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #pinError { color:#c0392b; font-size:0.82rem; margin-top:0.6rem; min-height:1.2em; }

  .lightbox { display:none; position:fixed; inset:0; background:rgba(10,10,20,0.92); z-index:3000; align-items:center; justify-content:center; padding:1.5rem; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:100%; max-height:90vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.5); object-fit:contain; }
  .lightbox-close { position:fixed; top:1.2rem; right:1.5rem; background:none; border:none; color:white; font-size:2rem; cursor:pointer; z-index:3001; opacity:0.8; }
  .lightbox-close:hover { opacity:1; }

  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:white; padding:0.75rem 1.5rem; border-radius:8px; font-size:0.88rem; z-index:9999; transition:transform 0.3s; pointer-events:none; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--green); }
  .toast.error   { background:#c0392b; }

  .loader { text-align:center; padding:3rem; color:var(--muted); font-size:0.9rem; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .small-input { border:1.5px solid var(--border); border-radius:5px; padding:0.2rem 0.4rem; font-size:0.82rem; outline:none; font-family:'DM Sans',sans-serif; background:var(--white); }
  .small-input:focus { border-color:var(--accent); }

  @media(max-width:600px) {
    .tab-btn { padding:0.85rem 1rem; font-size:0.82rem; }
    .panel { padding:1.25rem 0.75rem 3rem; }
    .questions-area { padding:1rem; }
    .rating-btn { width:36px; height:36px; }
  }
</style>
</head>
<body>

<header>
  <h1>Raccolta Dati — Rappresentazioni</h1>
  <p id="headerSub">Caricamento…</p>
</header>

<nav class="tab-nav">
  <button class="tab-btn" id="tabAdmin" onclick="handleTab('admin')">⚙️ Gestione</button>
  <button class="tab-btn active" id="tabForm" onclick="handleTab('form')">📋 Form intervistati</button>
  <button class="tab-btn" id="tabRisposte" onclick="handleTab('risposte')">📊 Risposte</button>
</nav>

<div class="panel" id="panel-admin"></div>
<div class="panel active" id="panel-form"><div class="loader"><div class="spinner"></div>Caricamento…</div></div>
<div class="panel" id="panel-risposte"></div>

<!-- PIN -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div style="font-size:2rem">🔐</div>
    <h2>Area riservata</h2>
    <p>Inserisci il PIN per accedere</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" placeholder="• • • •" autocomplete="off">
    <div id="pinError"></div>
    <button class="btn btn-secondary" style="margin-top:1rem;width:100%" onclick="closePinModal()">Annulla</button>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://nfnxrpjidlpghnsnfbez.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbnhycGppZGxwZ2huc25mYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1NDQsImV4cCI6MjA4OTg0MjU0NH0.SPJRD0MuJKcjPgOxfW2_h4l3IhJ_-geEXLx3phTgrcc';
const PIN = '4597';
const sb  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let pinUnlocked  = false;
let pinTarget    = null;
let adminCards   = [];
let formAnswers  = {};
let risposteData = [];

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerSub').textContent = 'Form per gli intervistati';
  loadForm();

  document.getElementById('pinInput').addEventListener('input', function() {
    this.classList.remove('shake');
    document.getElementById('pinError').textContent = '';
    if (this.value.length === 4) verifyPin();
  });
});

// ── TABS ─────────────────────────────────────────────────
function handleTab(tab) {
  if ((tab === 'admin' || tab === 'risposte') && !pinUnlocked) {
    pinTarget = tab;
    openPinModal();
    return;
  }
  switchTab(tab);
}

function switchTab(tab) {
  ['admin','form','risposte'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  const labels = { admin:'Pannello di gestione', form:'Form per gli intervistati', risposte:'Raccolta risposte' };
  document.getElementById('headerSub').textContent = labels[tab];
  if (tab === 'admin')    loadAdmin();
  if (tab === 'form')     loadForm();
  if (tab === 'risposte') loadRisposte();
}

// ── PIN ───────────────────────────────────────────────────
function openPinModal() {
  document.getElementById('pinInput').value = '';
  document.getElementById('pinInput').classList.remove('shake');
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinOverlay').classList.add('open');
  setTimeout(() => document.getElementById('pinInput').focus(), 150);
}
function closePinModal() {
  document.getElementById('pinOverlay').classList.remove('open');
  pinTarget = null;
}
function verifyPin() {
  const val = document.getElementById('pinInput').value;
  if (val === PIN) {
    pinUnlocked = true;
    closePinModal();
    if (pinTarget) switchTab(pinTarget);
  } else {
    const inp = document.getElementById('pinInput');
    inp.value = '';
    inp.classList.add('shake');
    document.getElementById('pinError').textContent = 'PIN errato, riprova.';
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}

// ════════════════════════════════════════════════════════
// ADMIN
// ════════════════════════════════════════════════════════
async function loadAdmin() {
  const panel = document.getElementById('panel-admin');
  panel.innerHTML = '<div class="loader"><div class="spinner"></div>Caricamento…</div>';

  const { data, error } = await sb
    .from('rappresentazioni')
    .select('*, domande(*)')
    .order('ordine', { ascending: true });

  if (error) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h2>Errore</h2><p>${esc(error.message)}</p></div>`;
    return;
  }

  adminCards = (data || []).map(r => ({
    ...r,
    domande: (r.domande || []).sort((a,b) => a.ordine - b.ordine)
  }));

  panel.innerHTML = `
    <div class="toolbar">
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-primary" onclick="addCard()">＋ Aggiungi rappresentazione</button>
        <span id="cardCounter" style="font-size:0.82rem;color:var(--muted)">
          <strong style="color:var(--ink)">${adminCards.length}</strong> scheda${adminCards.length!==1?'e':''}
        </span>
      </div>
    </div>
    <div id="cardList"></div>`;

  const list = document.getElementById('cardList');
  if (adminCards.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🖼️</div><h2>Nessuna rappresentazione ancora</h2>
      <p>Clicca su <strong>+ Aggiungi rappresentazione</strong> per iniziare.</p></div>`;
  } else {
    adminCards.forEach(c => list.appendChild(buildCardEl(c)));
  }
}

function buildCardEl(card) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-' + card.id;
  const imgHTML = card.immagine_url
    ? `<img src="${card.immagine_url}" alt="">`
    : `<div class="image-placeholder"><div class="ph-icon">🖼️</div><p>Clicca per caricare un'immagine<br><strong>JPG, PNG, WEBP</strong></p></div>`;

  div.innerHTML = `
    <div class="card-header">
      <span class="card-num">#${adminCards.indexOf(card)+1}</span>
      <input class="card-title-input" type="text" placeholder="Titolo rappresentazione…" value="${esc(card.titolo)}">
      <button class="btn-remove" onclick="deleteCard('${card.id}')">✕</button>
    </div>
    <div class="image-area" id="imgArea-${card.id}">
      ${imgHTML}
      <div class="img-overlay"><span>${card.immagine_url ? '🔍 Zoom / Cambia' : '⬆ Carica immagine'}</span></div>
      <div class="upload-progress" id="prog-${card.id}"></div>
      <input type="file" id="fi-${card.id}" accept="image/*">
    </div>
    <div class="questions-area" id="aq-${card.id}">
      <div class="add-question-row" id="addrow-${card.id}">
        <button class="btn btn-secondary" onclick="addQuestion('${card.id}','aperta')">＋ Risposta aperta</button>
        <button class="btn btn-secondary" onclick="addQuestion('${card.id}','scala')">＋ Scala di valutazione</button>
      </div>
    </div>`;

  // Aggiungi domande esistenti PRIMA del addrow
  const addrow = div.querySelector('#addrow-' + card.id);
  const aqContainer = div.querySelector('#aq-' + card.id);
  card.domande.forEach(q => {
    const qel = buildQuestionEl(q);
    aqContainer.insertBefore(qel, addrow);
  });

  // Event listeners
  const titleInput = div.querySelector('.card-title-input');
  titleInput.addEventListener('blur', () => saveCardTitle(card.id, titleInput.value));

  const imgArea = div.querySelector('#imgArea-' + card.id);
  const fileInput = div.querySelector('#fi-' + card.id);
  imgArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => uploadImage(card.id, e));

  // zoom sull'immagine se presente
  if (card.immagine_url) {
    const img = div.querySelector('img');
    img.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(card.immagine_url); });
  }

  return div;
}

function buildQuestionEl(q) {
  const div = document.createElement('div');
  div.className = 'question-block';
  div.id = 'qb-' + q.id;

  let extra = '';
  if (q.tipo === 'scala') {
    extra = `<div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;margin-top:0.4rem;">
      <span style="font-size:0.75rem;color:var(--muted)">da</span>
      <input type="number" class="small-input" style="width:50px" min="1" max="3" value="${q.scala_min}" id="qmin-${q.id}">
      <span style="font-size:0.75rem;color:var(--muted)">a</span>
      <input type="number" class="small-input" style="width:50px" min="2" max="10" value="${q.scala_max}" id="qmax-${q.id}">
      <input type="text" class="small-input" style="width:100px" placeholder="Etichetta min" value="${esc(q.label_min)}" id="qlmin-${q.id}">
      <input type="text" class="small-input" style="width:100px" placeholder="Etichetta max" value="${esc(q.label_max)}" id="qlmax-${q.id}">
    </div>`;
  } else {
    extra = `<div style="font-size:0.78rem;color:var(--muted)">Gli intervistati vedranno un campo testo libero</div>`;
  }

  div.innerHTML = `
    <div class="question-label">
      Domanda <span class="q-type-badge">${q.tipo === 'aperta' ? 'risposta aperta' : 'scala di valutazione'}</span>
      <button class="btn-remove" onclick="deleteQuestion('${q.id}','${q.rappresentazione_id}')">✕</button>
    </div>
    <input class="question-text-input" type="text" placeholder="Scrivi la domanda…" value="${esc(q.testo)}" id="qtxt-${q.id}">
    ${extra}`;

  // Event listeners salvataggio
  div.querySelector('#qtxt-' + q.id).addEventListener('blur', function() {
    saveQuestion(q.id, { testo: this.value });
  });
  if (q.tipo === 'scala') {
    div.querySelector('#qmin-' + q.id).addEventListener('blur', function() { saveQuestion(q.id, { scala_min: +this.value }); });
    div.querySelector('#qmax-' + q.id).addEventListener('blur', function() { saveQuestion(q.id, { scala_max: +this.value }); });
    div.querySelector('#qlmin-' + q.id).addEventListener('blur', function() { saveQuestion(q.id, { label_min: this.value }); });
    div.querySelector('#qlmax-' + q.id).addEventListener('blur', function() { saveQuestion(q.id, { label_max: this.value }); });
  }
  return div;
}

async function addCard() {
  const { data, error } = await sb
    .from('rappresentazioni')
    .insert({ titolo: '', ordine: adminCards.length })
    .select('*, domande(*)')
    .single();
  if (error) { showToast('Errore: ' + error.message, 'error'); return; }
  data.domande = [];
  adminCards.push(data);
  updateCounter();
  const list = document.getElementById('cardList');
  list.querySelector('.empty-state')?.remove();
  const el = buildCardEl(data);
  list.appendChild(el);
  setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}

function updateCounter() {
  const el = document.getElementById('cardCounter');
  if (el) el.innerHTML = `<strong style="color:var(--ink)">${adminCards.length}</strong> scheda${adminCards.length!==1?'e':''}`;
}

async function saveCardTitle(id, titolo) {
  await sb.from('rappresentazioni').update({ titolo }).eq('id', id);
}

async function deleteCard(id) {
  if (!confirm('Eliminare questa scheda e tutte le sue domande?')) return;
  await sb.from('rappresentazioni').delete().eq('id', id);
  adminCards = adminCards.filter(c => c.id !== id);
  document.getElementById('card-' + id)?.remove();
  updateCounter();
  if (adminCards.length === 0) {
    document.getElementById('cardList').innerHTML = `<div class="empty-state"><div class="icon">🖼️</div>
      <h2>Nessuna rappresentazione ancora</h2>
      <p>Clicca su <strong>+ Aggiungi rappresentazione</strong> per iniziare.</p></div>`;
  }
  showToast('Scheda eliminata', 'success');
}

async function addQuestion(cardId, tipo) {
  const card = adminCards.find(c => c.id === cardId);
  const { data, error } = await sb.from('domande')
    .insert({ rappresentazione_id: cardId, testo: '', tipo, ordine: card ? card.domande.length : 0 })
    .select().single();
  if (error) { showToast('Errore: ' + error.message, 'error'); return; }
  if (card) card.domande.push(data);
  const addrow = document.getElementById('addrow-' + cardId);
  const aqContainer = document.getElementById('aq-' + cardId);
  aqContainer.insertBefore(buildQuestionEl(data), addrow);
}

async function saveQuestion(id, fields) {
  await sb.from('domande').update(fields).eq('id', id);
}

async function deleteQuestion(id, cardId) {
  await sb.from('domande').delete().eq('id', id);
  document.getElementById('qb-' + id)?.remove();
  const card = adminCards.find(c => c.id === cardId);
  if (card) card.domande = card.domande.filter(q => q.id !== id);
}

async function uploadImage(cardId, event) {
  const file = event.target.files[0];
  if (!file) return;
  const prog = document.getElementById('prog-' + cardId);
  prog.style.transform = 'scaleX(0.4)';
  const ext = file.name.split('.').pop();
  const path = `${cardId}_${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('immagini').upload(path, file, { upsert: true });
  if (upErr) { showToast('Errore upload: ' + upErr.message, 'error'); prog.style.transform='scaleX(0)'; return; }
  prog.style.transform = 'scaleX(0.8)';
  const { data: urlData } = sb.storage.from('immagini').getPublicUrl(path);
  const url = urlData.publicUrl;
  await sb.from('rappresentazioni').update({ immagine_url: url }).eq('id', cardId);
  const card = adminCards.find(c => c.id === cardId);
  if (card) card.immagine_url = url;
  prog.style.transform = 'scaleX(1)';
  setTimeout(() => prog.style.transform = 'scaleX(0)', 600);
  const area = document.getElementById('imgArea-' + cardId);
  area.querySelector('.image-placeholder')?.remove();
  let img = area.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    area.insertBefore(img, area.querySelector('.img-overlay'));
  }
  img.src = url;
  img.onclick = (e) => { e.stopPropagation(); openLightbox(url); };
  area.querySelector('.img-overlay span').textContent = '🔍 Zoom / Cambia';
  showToast('✅ Immagine caricata!', 'success');
  event.target.value = '';
}

// ════════════════════════════════════════════════════════
// FORM PUBBLICO
// ════════════════════════════════════════════════════════
async function loadForm() {
  const panel = document.getElementById('panel-form');
  panel.innerHTML = '<div class="loader"><div class="spinner"></div>Caricamento…</div>';
  formAnswers = {};

  const { data, error } = await sb
    .from('rappresentazioni')
    .select('*, domande(*)')
    .order('ordine', { ascending: true });

  if (error) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h2>Errore</h2><p>${esc(error.message)}</p></div>`;
    return;
  }

  const cards = (data||[]).map(r => ({ ...r, domande: (r.domande||[]).sort((a,b)=>a.ordine-b.ordine) }));

  if (cards.length === 0) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">📋</div><h2>Nessun contenuto ancora</h2>
      <p>Il gestore deve prima aggiungere le rappresentazioni dal pannello Gestione.</p></div>`;
    return;
  }

  let html = `<div style="text-align:center;padding:2rem 1rem 1.5rem">
    <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:0.5rem">Compila il questionario</h2>
    <p style="color:var(--muted);font-size:0.9rem">Visualizza ogni rappresentazione e rispondi alle domande.</p>
  </div>`;

  cards.forEach(card => {
    html += `<div class="form-card">
      <div class="form-card-title">${esc(card.titolo)||'<em>Rappresentazione</em>'}</div>
      ${card.immagine_url ? `<div class="form-image-wrap"><img src="${card.immagine_url}" onclick="openLightbox('${card.immagine_url}')"></div>` : ''}
      <div class="form-questions">
        ${card.domande.map(q => buildFormQ(q)).join('')}
        ${card.domande.length===0 ? '<p style="color:var(--muted);font-size:0.85rem;font-style:italic">Nessuna domanda per questa scheda.</p>' : ''}
      </div>
    </div>`;
  });

  html += `<div class="submit-area">
    <button class="btn btn-success btn-submit" id="submitBtn" onclick="submitForm()">✓ Invia risposte</button>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:0.75rem">Le risposte vengono salvate in modo anonimo</p>
  </div>`;

  panel.innerHTML = html;
}

function buildFormQ(q) {
  if (q.tipo === 'aperta') {
    return `<div class="form-question">
      <label>${esc(q.testo)||'Domanda'}</label>
      <textarea class="answer-textarea" placeholder="Scrivi la tua risposta…"
        oninput="formAnswers['${q.id}']=this.value"></textarea>
    </div>`;
  }
  let btns = '';
  for (let i = q.scala_min; i <= q.scala_max; i++) {
    btns += `<button type="button" class="rating-btn" data-v="${i}"
      onclick="selectRating('${q.id}',${i},${q.scala_min},${q.scala_max})">${i}</button>`;
  }
  return `<div class="form-question">
    <label>${esc(q.testo)||'Domanda'}</label>
    <div class="rating-scale" id="scale-${q.id}">${btns}</div>
    <div class="scale-labels"><span>${esc(q.label_min)}</span><span>${esc(q.label_max)}</span></div>
  </div>`;
}

function selectRating(qId, val, min, max) {
  formAnswers[qId] = val;
  document.getElementById('scale-' + qId).querySelectorAll('.rating-btn').forEach(b => {
    b.classList.toggle('selected', +b.dataset.v === val);
  });
}

async function submitForm() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Invio in corso…';

  const { data: domande } = await sb.from('domande').select('id, rappresentazione_id');
  const domMap = {};
  (domande||[]).forEach(d => domMap[d.id] = d.rappresentazione_id);

  const inserts = Object.entries(formAnswers).map(([domanda_id, risposta]) => ({
    domanda_id, risposta: String(risposta),
    rappresentazione_id: domMap[domanda_id] || null
  }));

  if (inserts.length === 0) {
    showToast('⚠️ Nessuna risposta da inviare', 'error');
    btn.disabled = false; btn.textContent = '✓ Invia risposte'; return;
  }

  const { error } = await sb.from('risposte').insert(inserts);
  if (error) {
    showToast('Errore: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = '✓ Invia risposte'; return;
  }

  document.getElementById('panel-form').innerHTML = `
    <div class="empty-state" style="padding:6rem 2rem">
      <div class="icon">🎉</div><h2>Grazie per le tue risposte!</h2>
      <p>Le tue risposte sono state registrate con successo.</p>
    </div>`;
  showToast('✅ Risposte inviate!', 'success');
}

// ════════════════════════════════════════════════════════
// RISPOSTE
// ════════════════════════════════════════════════════════
async function loadRisposte() {
  const panel = document.getElementById('panel-risposte');
  panel.innerHTML = '<div class="loader"><div class="spinner"></div>Caricamento risposte…</div>';

  const { data, error } = await sb
    .from('risposte')
    .select('*, domande(testo, tipo, rappresentazioni(titolo))')
    .order('created_at', { ascending: false });

  if (error) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h2>Errore</h2><p>${esc(error.message)}</p></div>`;
    return;
  }

  risposteData = data || [];

  if (risposteData.length === 0) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">📊</div><h2>Nessuna risposta ancora</h2>
      <p>Le risposte degli intervistati appariranno qui.</p></div>`;
    return;
  }

  panel.innerHTML = `
    <div class="toolbar">
      <span style="font-size:0.85rem;color:var(--muted)">
        <strong style="color:var(--ink)">${risposteData.length}</strong> risposta${risposteData.length!==1?'e':''}
      </span>
      <button class="btn btn-success" onclick="exportCSV()">⬇ Esporta CSV</button>
    </div>
    <div style="overflow-x:auto">
      <table class="risposte-table">
        <thead><tr><th>Rappresentazione</th><th>Domanda</th><th>Tipo</th><th>Risposta</th><th>Data</th></tr></thead>
        <tbody>
          ${risposteData.map(r=>`<tr>
            <td>${esc(r.domande?.rappresentazioni?.titolo||'—')}</td>
            <td>${esc(r.domande?.testo||'—')}</td>
            <td>${esc(r.domande?.tipo||'—')}</td>
            <td>${esc(r.risposta||'—')}</td>
            <td style="color:var(--muted);font-size:0.8rem;white-space:nowrap">${new Date(r.created_at).toLocaleString('it-IT')}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function exportCSV() {
  if (!risposteData.length) return;
  const rows = [['Rappresentazione','Domanda','Tipo','Risposta','Data'].map(csv).join(',')];
  risposteData.forEach(r => rows.push([
    r.domande?.rappresentazioni?.titolo||'', r.domande?.testo||'',
    r.domande?.tipo||'', r.risposta||'',
    new Date(r.created_at).toLocaleString('it-IT')
  ].map(csv).join(',')));
  const blob = new Blob(['\uFEFF'+rows.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'risposte_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); showToast('✅ CSV esportato!', 'success');
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function csv(v) { return `"${String(v??'').replace(/"/g,'""')}"`; }

function openLightbox(src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox()   { document.getElementById('lightbox').classList.remove('open'); }

document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeLightbox(); closePinModal(); } });

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
